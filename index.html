<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Professional</title>

<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif;}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(-45deg,#2196f3,#00bcd4,#673ab7,#3f51b5);
  background-size:400% 400%;
  animation:bgmove 12s infinite;
}

@keyframes bgmove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  background:rgba(255,255,255,0.15);
  padding:40px;
  width:400px;
  border-radius:20px;
  backdrop-filter:blur(12px);
  box-shadow:0 10px 35px rgba(0,0,0,0.35);
  animation:fadeIn 1s;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h2{
  text-align:center;
  color:white;
  margin-bottom:30px;
  letter-spacing:1px;
}

/* FLOATING LABELS */
.inputBox{
  position:relative;
  margin-bottom:20px;
}

.inputBox input,
.inputBox textarea{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.25);
  color:white;
  outline:none;
  font-size:14px;
  transition:0.3s;
}

.inputBox label{
  position:absolute;
  left:15px;
  top:14px;
  color:white;
  pointer-events:none;
  transition:0.3s;
}

.inputBox input:focus + label,
.inputBox input:not(:placeholder-shown) + label,
.inputBox textarea:focus + label,
.inputBox textarea:not(:placeholder-shown) + label{
  top:-10px;
  font-size:12px;
  color:#00fff7;
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:white;
  color:#111;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

button:hover{
  background:#00bcd4;
  color:white;
  transform:scale(1.05);
}

/* Popup */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(255,255,255,0.95);
  padding:30px 40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  transition:0.4s;
  z-index:1000;
}

.popup.active{
  transform:translate(-50%,-50%) scale(1);
}

.popup h3{
  color:#2196f3;
  margin-bottom:15px;
  font-size:24px;
}

/* Tick animation */
.tick{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #00bcd4;
  display:inline-block;
  position:relative;
  margin-bottom:15px;
  animation:scaleIn 0.5s ease forwards;
}

.tick::after{
  content:'';
  position:absolute;
  left:18px;
  top:30%;
  width:15px;
  height:30px;
  border-right:3px solid #00bcd4;
  border-bottom:3px solid #00bcd4;
  transform:rotate(45deg);
  animation:tickDraw 0.5s ease forwards;
  animation-delay:0.3s;
}

@keyframes scaleIn{
  0%{transform:scale(0);}
  100%{transform:scale(1);}
}

@keyframes tickDraw{
  0%{height:0; width:0;}
  100%{height:30px; width:15px;}
}

/* Footer */
footer{
  margin-top:40px;
  width:100%;
  padding:15px 0;
  background:rgba(0,0,0,0.7);
  color:white;
  text-align:center;
  backdrop-filter:blur(5px);
}

footer a{
  color:#00fff7;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

footer a:hover{
  color:#ff0;
}
</style>
</head>

<body>

<div class="container">
<h2>Contact Me</h2>

<form id="contactForm">

<div class="inputBox">
<input type="text" name="name" required placeholder=" ">
<label>Your Name</label>
</div>

<div class="inputBox">
<input type="email" name="email" required placeholder=" ">
<label>Your Email</label>
</div>

<div class="inputBox">
<textarea name="message" rows="5" required placeholder=" "></textarea>
<label>Your Message</label>
</div>

<button type="submit">Send Message</button>
</form>
</div>

<!-- Popup -->
<div class="popup" id="popup">
<div class="tick"></div>
<h3>Thank You!</h3>
<p>Your message has been sent successfully.</p>
<button onclick="closePopup()">OK</button>
</div>

<!-- Footer -->
<footer>
<p>© 2026 Turrab Haider | Connect with me:</p>
<a href="https://linkedin.com" target="_blank">LinkedIn</a>|
<a href="https://github.com" target="_blank">GitHub</a>|
<a href="https://twitter.com" target="_blank">Twitter</a>
</footer>

<script>
const form = document.getElementById("contactForm");
const popup = document.getElementById("popup");

form.addEventListener("submit", function(e){
    e.preventDefault(); // prevent default submission

    const formData = new FormData(form);

    fetch("https://formsubmit.co/ajax/turrabhaider061@gmail.com", {
        method:"POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        popup.classList.add("active");
        form.reset();
    })
    .catch(err => {
        alert("Error! Please try again.");
        console.error(err);
    });
});

function closePopup(){
    popup.classList.remove("active");
}
</script>

</body>
</html>
