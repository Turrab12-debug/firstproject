<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Animated</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#2196f3,#00bcd4,#673ab7,#3f51b5);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    background: rgba(255,255,255,0.15);
    padding:35px;
    width:380px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    animation: fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:white;
}

.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box input,
.input-box textarea{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:8px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ffffff;
    color:#333;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#000;
    color:white;
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h2>Contact Us</h2>

    <!-- FormSubmit Integration -->
    <form action="https://formsubmit.co/turrabhaider061@gmail.com" method="POST">

        <!-- Disable Captcha -->
        <input type="hidden" name="_captcha" value="false">

        <!-- Redirect After Submit -->
        <input type="hidden" name="_next" value="https://example.com/thankyou.html">

        <div class="input-box">
            <input type="text" name="name" placeholder="Your Name" required>
        </div>

        <div class="input-box">
            <input type="email" name="email" placeholder="Your Email" required>
        </div>

        <div class="input-box">
            <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
