<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Turrab Haider</title>

<!-- Google Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!-- Font Awesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/597/597177.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
flex-direction:column;
color:white;
}

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:450px;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(10px);
padding:35px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
animation:fadeIn 0.6s ease;
}

legend{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
display:flex;
align-items:center;
gap:8px;
}

fieldset{
border:none;
}

.input-group{
position:relative;
margin-bottom:18px;
}

.input-group i{
position:absolute;
top:12px;
left:12px;
color:#9ca3af;
}

input, textarea{
width:100%;
padding:12px 12px 12px 40px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
font-size:14px;
transition:0.3s;
}

input:focus, textarea:focus{
border:1px solid #3b82f6;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

button:hover{
background:#1d4ed8;
}

footer{
text-align:center;
padding:18px;
background:#0f172a;
font-size:14px;
color:#94a3b8;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
color:#111;
padding:30px;
border-radius:12px;
text-align:center;
width:320px;
animation:scaleIn 0.4s ease;
}

.success-icon{
font-size:40px;
color:#16a34a;
margin-bottom:10px;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes scaleIn{
from{transform:scale(0.8); opacity:0;}
to{transform:scale(1); opacity:1;}
}

@media(max-width:480px){
.card{
padding:25px;
}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<form id="contactForm">
<fieldset>
<legend><span class="material-icons">contact_mail</span> Contact Us</legend>

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" name="name" placeholder="Full Name" required>
</div>

<div class="input-group">
<i class="fa fa-phone"></i>
<input type="tel" name="phone" placeholder="Phone Number 11 digits"
pattern="[0-9]{11}" maxlength="11" required>
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<textarea name="message" rows="4" placeholder="Your Message" required></textarea>
</div>

<button type="submit">
<i class="fa fa-paper-plane"></i> Send Message
</button>

</fieldset>
</form>

</div>
</div>

<div class="popup" id="popup">
<div class="popup-content">
<div class="success-icon">
<i class="fa fa-check-circle"></i>
</div>
<h2>Thank You</h2>
<p>Your message has been sent successfully.</p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<footer>
© 2026 Turrab Haider | All Rights Reserved
</footer>

<script>
const form=document.getElementById("contactForm");

form.addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/ajax/turrabhaider061@gmail.com",{
method:"POST",
body:new FormData(form),
headers:{'Accept':'application/json'}
})
.then(response=>response.json())
.then(data=>{
if(data.success==="true"){
document.getElementById("popup").style.display="flex";
form.reset();
}
});
});

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
